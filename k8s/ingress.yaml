# Traefik / nginx Ingress Controller ile HTTPS (K3s / Rancher)
# deploy-production.sh bu dosyayı otomatik uygular.
#
# Canlı host: akgun.derneklab.com

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: akgunteknik-ingress
  annotations:
    # nginx ingress — uzun API / Excel istekleri (varsayılan 60s → 504 verir)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/client-body-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # cert-manager kullanıyorsanız:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: akgun.derneklab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: akgunteknik-frontend
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - akgun.derneklab.com
  #     secretName: akgunteknik-tls
