# ÖRNEK — yeni kurulum için referans. Rancher/canlı ortamda kubectl apply ETMEYİN.
# Canlıda timeout için: bash k8s/patch-ingress-timeouts.sh
# Host ve TLS ayarlarını Rancher UI üzerinden yönetin.

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: akgunteknik-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/client-body-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: erp.ornek-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: akgunteknik-frontend
                port:
                  number: 80
