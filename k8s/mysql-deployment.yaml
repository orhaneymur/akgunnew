# MySQL 8.0 — Akgün Teknik ERP (K3s)
# Tek komut: kubectl apply -f k8s/
# Harici Secret/ConfigMap gerekmez — tüm değerler aşağıda gömülüdür.
#
# Gömülü kimlik bilgileri:
#   MYSQL_ROOT_PASSWORD = akgunteknik123
#   MYSQL_DATABASE      = akgunteknik
#   DATABASE_URL (backend) = mysql://root:akgunteknik123@akgunteknik-mysql:3306/akgunteknik

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: akgunteknik-mysql-pvc
  labels:
    app: akgunteknik-mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akgunteknik-mysql
  labels:
    app: akgunteknik-mysql
    tier: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: akgunteknik-mysql
  template:
    metadata:
      labels:
        app: akgunteknik-mysql
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: akgunteknik123
            - name: MYSQL_DATABASE
              value: akgunteknik
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: akgunteknik-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: akgunteknik-mysql
  labels:
    app: akgunteknik-mysql
spec:
  type: ClusterIP
  selector:
    app: akgunteknik-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
