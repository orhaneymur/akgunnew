# Akgün Teknik ERP — K3s / Kubernetes (tek komut kurulum)
# kubectl apply -f k8s/
# Harici Secret/ConfigMap gerekmez.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akgunteknik-backend
  labels:
    app: akgunteknik-backend
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: akgunteknik-backend
  template:
    metadata:
      labels:
        app: akgunteknik-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: since1907/akgun-backend:v1.8.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: Europe/Istanbul
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: "v1.8.0"
            - name: DATABASE_URL
              value: mysql://root:akgunteknik123@akgunteknik-mysql:3306/akgunteknik
          readinessProbe:
            httpGet:
              path: /api/sales/dashboard
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/sales/dashboard
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: akgunteknik-backend
  labels:
    app: akgunteknik-backend
spec:
  type: ClusterIP
  selector:
    app: akgunteknik-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akgunteknik-frontend
  labels:
    app: akgunteknik-frontend
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: akgunteknik-frontend
  template:
    metadata:
      labels:
        app: akgunteknik-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: since1907/akgun-frontend:v1.8.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: akgunteknik-frontend
  labels:
    app: akgunteknik-frontend
spec:
  type: LoadBalancer
  selector:
    app: akgunteknik-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
