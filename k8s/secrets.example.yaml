# Kubernetes Secret şablonu — production için önerilir
# Gömülü DATABASE_URL yerine Secret kullanın:
#
#   kubectl create secret generic akgunteknik-secrets \
#     --from-literal=DATABASE_URL='mysql://root:SIFRE@akgunteknik-mysql:3306/akgunteknik' \
#     --from-literal=JWT_SECRET='uzun-rastgele-bir-deger'
#
# Ardından k8s/apps.yaml içinde backend env:
#   - name: DATABASE_URL
#     valueFrom:
#       secretKeyRef:
#         name: akgunteknik-secrets
#         key: DATABASE_URL
#   - name: JWT_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: akgunteknik-secrets
#         key: JWT_SECRET

apiVersion: v1
kind: Secret
metadata:
  name: akgunteknik-secrets
type: Opaque
stringData:
  DATABASE_URL: mysql://root:akgunteknik123@akgunteknik-mysql:3306/akgunteknik
  JWT_SECRET: degistirin-guclu-bir-jwt-secret
