server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;
    client_body_timeout 600s;
    send_timeout 600s;
    keepalive_timeout 650s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API isteklerini backend servisine yönlendir (tarayıcı aynı origin'den konuşur)
    location /api/ {
        proxy_pass http://akgunteknik-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;
        send_timeout 600s;

        # Uzun Excel import / büyük yanıtlar — tamponlama kapat (504 önleme)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }

    # SPA — tüm rotalar index.html'e düşer
    location / {
        try_files $uri $uri/ /index.html;
    }
}
